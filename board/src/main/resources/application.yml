spring:
  profiles:
    active: ${ACTIVE:default}

  application:
    name: board

  data:
    redis:
      host: ${REDIS_HOST}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      port: 14519
      timeout: 6000ms

  datasource:
    url: ${POST_DB_URL}
    username: ${POST_DB_USERNAME}
    password: ${POST_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2

  flyway:
    default-schema: public
    schemas: public
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/board/${DB}

  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8083

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka



storage:
  provider: SUPABASE

cloud:
  aws:
    credentials:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
    region:
      static: ${AWS_S3_REGION}
    s3:
      bucket: "lp-test-file-s3"
      cdn-url: "https://d2852js64u96av.cloudfront.net"

  supabase:
    storage:
      url: "https://bslqqhqazltmfngmmznr.supabase.co"
      bucket: "test-file-supabase"
      service-role-key: ${SUPABASE_SERVICE_ROLE}
