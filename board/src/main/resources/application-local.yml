spring:
  config:
    activate:
      on-profile: local

  application:
    name: board

cloud:
  aws:
    s3:
      trust-all-certs: true

eureka:
  instance:
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 3
    service-url:
      defaultZone: http://localhost:8761/eureka
