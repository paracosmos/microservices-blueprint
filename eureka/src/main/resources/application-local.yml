spring:
  config:
    activate:
      on-profile: local

  application:
    name: eureka

eureka:
  instance:
    hostname: localhost

  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka

  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 3000
