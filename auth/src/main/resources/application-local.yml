spring:
  config:
    activate:
      on-profile: local

  application:
    name: auth

  reactor:
    context-propagation: auto

eureka:
  instance:
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 3
    service-url:
      defaultZone: http://localhost:8761/eureka
