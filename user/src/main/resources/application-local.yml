spring:
  config:
    activate:
      on-profile: local

    import: optional:file:.env

  application:
    name: user

eureka:
  instance:
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 3
    service-url:
      defaultZone: http://localhost:8761/eureka

management:

#  tracing:
#    enabled: true
#    propagation:
#      type: B3

  endpoints:
    web:
      exposure:
        include: "*"
